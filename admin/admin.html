<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRIDEX LIVE — Admin Panel</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d16;
      color: #f0f0f5;
      padding: 24px;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 4px;
      background: linear-gradient(90deg, #7f5af0, #2cb67d, #ff6ac1);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .subtitle { color: #9c9cb8; font-size: 13px; margin: 0 0 20px; }

    .panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .login-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    input[type="text"], input[type="password"], input[type="number"], input[type="color"] {
      background: #16161f;
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #0a0a12;
      background: linear-gradient(90deg, #7f5af0, #2cb67d);
    }
    button.secondary {
      background: rgba(255,255,255,0.1);
      color: #f0f0f5;
    }
    button.danger {
      background: linear-gradient(90deg, #ff5470, #ff8a5c);
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .stats {
      display: flex;
      gap: 24px;
      font-size: 14px;
      color: #cfcfe0;
    }
    .stats b { color: #fff; font-size: 20px; display: block; }

    .status-line { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #9c9cb8; margin-top: 8px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #ff5470; }
    .dot.online { background: #2cb67d; }

    .cmd-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }
    .cmd-grid button { padding: 16px; font-size: 15px; }

    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 10px; }

    #log {
      height: 160px;
      overflow-y: auto;
      background: #0a0a12;
      border-radius: 8px;
      padding: 10px;
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 12px;
      color: #7fd88f;
    }
  </style>
</head>
<body>
  <h1>TRIDEX LIVE — Admin Panel</h1>
  <p class="subtitle">Bağlı tüm cihazlara senkronize ışık komutları gönder</p>

  <div class="panel">
    <div class="login-row">
      <input type="text" id="serverUrl" placeholder="WebSocket adresi (boş bırakılırsa otomatik)" />
      <input type="password" id="adminKey" placeholder="Admin anahtarı" value="tridex2026" />
      <button id="connectBtn">Bağlan</button>
      <span class="status-line"><span id="connDot" class="dot"></span><span id="connText">Bağlı değil</span></span>
    </div>
  </div>

  <div class="panel stats">
    <div>Katılımcı<b id="audienceCount">0</b></div>
    <div>LED Destekli<b id="torchCount">0</b></div>
    <div>Admin<b id="adminCount">0</b></div>
  </div>

  <div class="panel">
    <div class="cmd-grid">
      <button data-cmd="WHITE_ON">⚪ WHITE_ON</button>
      <button data-cmd="BLACK">⚫ BLACK</button>
      <button data-cmd="BLINK">✨ BLINK</button>
      <button data-cmd="STROBE">⚡ STROBE</button>
      <button class="danger" data-cmd="STOP">⏹ STOP</button>
    </div>

    <div class="row">
      <label>Renk: <input type="color" id="colorPicker" value="#ff00ff" /></label>
      <button id="sendColorBtn">🎨 COLOR Gönder</button>
    </div>

    <div class="row">
      <label>Geri sayım (sn): <input type="number" id="countdownSeconds" value="3" min="1" max="30" /></label>
      <button id="sendCountdownBtn">⏱ COUNTDOWN Gönder</button>
    </div>

    <div class="row">
      <label>BLINK/STROBE aralığı (ms): <input type="number" id="intervalMs" value="150" min="30" max="2000" /></label>
      <label>Süre (ms): <input type="number" id="durationMs" value="4000" min="500" max="60000" /></label>
    </div>
  </div>

  <div class="panel">
    <p class="subtitle" style="margin-bottom:6px;">Komut Kayıtları</p>
    <div id="log"></div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
